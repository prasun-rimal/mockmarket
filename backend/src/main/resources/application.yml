spring:
  application:
    name: mockmarket
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/mockmarket}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-dev-secret-to-a-long-random-production-value}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  market:
    finnhub-api-key: ${FINNHUB_API_KEY:}
    demo-mode: ${MARKET_DEMO_MODE:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
